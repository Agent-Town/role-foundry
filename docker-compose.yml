# Role Foundry — Local Development Stack
#
# Quick start:
#   cp .env.example .env
#   docker compose up
#   open http://localhost:8080
#
# Architecture:
#   - role-foundry-web: Static judge-facing UI (demo mode, no backend needed)
#   - postgres: Persistent store for roles, scenarios, runs, scores (used by Clawith)
#   - redis: Run queue and pub/sub for live events (used by Clawith)
#   - clawith: Control plane for agent orchestration, run registry, evaluation store
#   - bootstrap: Read-only preflight probe against a live Clawith instance
#
# Current status:
#   - role-foundry-web: WORKING (demo mode, serves static HTML)
#   - postgres + redis: WORKING (standard images, ready for Clawith)
#   - clawith: LIVE PROFILE — set CLAWITH_IMAGE in .env, start with --profile live
#   - bootstrap: LIVE PROFILE — read-only HTTP probe; no destructive upstream writes
#
# Clawith integration notes:
#   Clawith is a separate project (github.com/openclaw/clawith). To integrate:
#   1. Build the Clawith image: docker build -t clawith:local /path/to/clawith
#   2. Or set CLAWITH_IMAGE to a registry image in .env
#   3. Start live mode: docker compose --profile live up
#   This repo must stay portable — no sibling path references allowed.
#   See docs/clawith-integration.md for the full integration guide.

services:
  # ─── Working Services ─────────────────────────────────────────────

  role-foundry-web:
    build: .
    ports:
      - "${WEB_PORT:-8080}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080')"]
      interval: 10s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rolefoundry}
      POSTGRES_USER: ${POSTGRES_USER:-rf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rfdev}
    # No host port binding in demo mode — keeps the standalone UI from colliding
    # with any local Postgres already running on the judge's machine.
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rf}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    # No host port binding in demo mode — Redis is only needed on the internal
    # Docker network for future live-mode services.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Live-Mode Services (activate with: docker compose --profile live up) ──

  clawith:
    image: ${CLAWITH_IMAGE:-clawith:local}
    profiles: ["live"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-rf}:${POSTGRES_PASSWORD:-rfdev}@postgres:5432/${POSTGRES_DB:-rolefoundry}
      REDIS_URL: redis://redis:6379
      CLAWITH_SECRET: ${CLAWITH_SECRET:-changeme}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "${CLAWITH_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  bootstrap:
    build: .
    profiles: ["live"]
    command: ["python3", "seed/probe_clawith.py", "--base-url", "http://clawith:3000"]
    environment:
      CLAWITH_URL: http://clawith:3000
    volumes:
      - ./seed:/srv/seed:ro
    depends_on:
      clawith:
        condition: service_healthy
    restart: "no"

volumes:
  pgdata:
